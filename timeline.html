<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beiyang History Interactive Timeline</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        .search-input { margin: 15px; padding: 10px; width: 95%; }
        .timeline { margin: 20px; }
    </style>
</head>
<body>
    <h1>北洋历史互动时间轴</h1>
    <input type="text" class="search-input" placeholder="搜索事件..." oninput="filterEvents(this.value)">
    <div class="timeline" id="timelineContent">
        <pre class="mermaid">
        graph TD;
            A[事件1] --> B[事件2];
            B --> C[事件3];
            C --> D[事件4];
        </pre>
    </div>
    <script>
        mermaid.initialize({ startOnLoad: true });

        function filterEvents(query) {
            var events = document.querySelectorAll('.timeline pre');
            events.forEach(event => {
                if (event.innerText.includes(query)) {
                    event.style.display = 'block';
                } else {
                    event.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
