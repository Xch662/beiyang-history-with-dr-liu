<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beiyang Historical Figures and Relations</title>
    <script type="module">
        import { mermaid } from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: true });
    </script>
</head>
<body>
    <h1>Interactive Visualization of Beiyang Historical Figures</h1>
    <div class="mermaid">
        graph TD;
            A[Warlord A] -->|Alliance| B[Warlord B];
            A -->|Conflict| C[Warlord C];
            B -->|Political Affiliation| D[Leader D];
            C -->|Alliance| D;
            E[Warlord E] -->|Conflict| A;
            E -->|Alliance| D;
    </div>
</body>
</html>
